spring.application.name=reporting-service
server.port=${REPORTING_SERVER_PORT:8084}
spring.profile.active=prod
# Tomcat connection timeout settings
server.tomcat.connection-timeout=60000
server.tomcat.keep-alive-timeout=60000

# Reduce Tomcat error logging for multipart exceptions (logged by ExceptionController)
logging.level.org.apache.catalina.core.ContainerBase.[Catalina].[localhost].[/].[dispatcherServlet]=WARN
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=WARN

# postgres-db
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# RabbitMQ (Spring Boot standard properties)
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:false}
# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/rms}

# eureka
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8081/eureka}
eureka.instance.preferIpAddress=true
eureka.instance.hostname=${HOSTNAME:localhost}

# service-specific
service.url=${REPORTING_SERVICE_BASE_URL:http://localhost:8084}/api/reporting

# jpa
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# service-specific
app.email.super-admin=${SUPER_ADMIN_EMAIL:noreply@example.com}

##Health Probes Endpoint.
management.endpoint.health.probes.enabled=true